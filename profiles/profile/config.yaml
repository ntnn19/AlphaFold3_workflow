use-singularity: true
#singularity-args: >
#  -B /scratch
#  -B /cluster
#  -B /datasets
#  --nv

executor: slurm

default-resources:
    slurm_partition: "normal"
    slurm_account: "topf"

set-resources:
    AF3_DATA_SPEEDY_PIPELINE:
        nodes: 1
        runtime: 10000
        cpus_per_task: 16
        mem_mb: 496000
    AF3_INFERENCE:
        nodes: 1
        runtime: 10000
        mem_mb: 16000
        tasks_per_gpu: 0
        gpu: 1
#        slurm_extra: "'--gpus=1'"
#        slurm_extra: "'--nodelist=cssbhpiuke[012,032,035,037],cssblivuke081'"
#        slurm_extra: "'--nodelist=cssbhpiuke[012,032,035,037],cssblivuke081' '--gpus=1'"
